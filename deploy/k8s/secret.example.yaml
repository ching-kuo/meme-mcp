apiVersion: v1
kind: Secret
metadata:
  name: meme-mcp
# Template only. Copy to secret.yaml (gitignored) and fill in real values, or
# manage encrypted (e.g. SOPS/sealed-secrets). NEVER commit real values.
#
# SESSION_SECRET and PAT_HASH_PEPPER must each be >= 32 chars and must NOT
# contain the substring "dev" (startup rejects weak/dev values when bound to a
# non-loopback host). Generate with: openssl rand -hex 32
stringData:
  SESSION_SECRET: replace-with-openssl-rand-hex-32-at-least-32-chars
  PAT_HASH_PEPPER: replace-with-openssl-rand-hex-32-at-least-32-chars
  # GitHub OAuth app secret (the client ID is in the ConfigMap).
  GITHUB_CLIENT_SECRET: replace-with-github-oauth-app-client-secret
  # VLM / embedding backend keys. Required non-empty even if the backend (e.g.
  # Ollama) ignores the value.
  VLM_API_KEY: replace-with-vlm-api-key
  EMBEDDING_API_KEY: replace-with-embedding-api-key
  # Google OAuth client (only when GOOGLE_OAUTH_ENABLED=true in the ConfigMap).
  # GOOGLE_CLIENT_ID: replace-with-google-oauth-client-id
  # GOOGLE_CLIENT_SECRET: replace-with-google-oauth-client-secret
