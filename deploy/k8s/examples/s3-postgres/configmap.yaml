apiVersion: v1
kind: ConfigMap
metadata:
  name: meme-mcp
data:
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8000"

  # Postgres is the source of truth for templates, vectors, receipts, and
  # PATs. STORAGE_DIR is still needed for the GitHub allowlist file and any
  # operator-managed parity manifests.
  STORAGE_DIR: "/data"

  # DATABASE_URL lives in the Secret because it contains the app password.
  # See secret.example.yaml.

  IMAGE_STORE_BACKEND: "s3"
  S3_ENDPOINT: "https://s3.example.com"
  S3_BUCKET: "meme-mcp"
  S3_REGION: "us-east-1"
  # Set to "false" against AWS S3 itself; keep "true" for MinIO / R2 / Ceph
  # RGW and most other S3-compatible providers.
  S3_FORCE_PATH_STYLE: "true"
