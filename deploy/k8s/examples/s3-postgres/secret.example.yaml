# Copy to secret.yaml (gitignored) and fill in real values. The DATABASE_URL
# is the only field that depends on the CNPG-provisioned password; the README
# in this directory shows the one-liner that builds it from the
# `meme-mcp-postgres-app` Secret CNPG creates.
apiVersion: v1
kind: Secret
metadata:
  name: meme-mcp
stringData:
  # Driver scheme must be `postgresql+psycopg://` so SQLAlchemy uses psycopg3.
  # `sslmode=require` matches CNPG's TLS-enabled default.
  DATABASE_URL: "postgresql+psycopg://meme:REPLACE_WITH_CNPG_PASSWORD@meme-mcp-postgres-rw:5432/meme?sslmode=require"

  # 32+ chars, non-placeholder. Generate with `openssl rand -base64 48`.
  SESSION_SECRET: "REPLACE_WITH_RANDOM_48_BYTES"
  PAT_HASH_PEPPER: "REPLACE_WITH_RANDOM_48_BYTES"

  S3_ACCESS_KEY_ID: "REPLACE_ME"
  S3_SECRET_ACCESS_KEY: "REPLACE_ME"
