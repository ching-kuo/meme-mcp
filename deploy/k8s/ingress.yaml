apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meme-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  rules:
    - host: meme-mcp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meme-mcp
                port:
                  number: 80
  tls:
    - hosts:
        - meme-mcp.example.com
      secretName: meme-mcp-tls

