apiVersion: v1
kind: ConfigMap
metadata:
  name: meme-mcp
data:
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8000"
  IMAGE_STORE_BACKEND: "filesystem"
  IMAGE_STORE_FS_PATH: "/data/images"
  STORAGE_DIR: "/data"
  DATABASE_URL: "sqlite+aiosqlite:////data/meme-mcp.db"
  # Render retention: drives both the gc-renders sweep and the signed render-URL
  # TTL ceiling. RENDER_URL_TTL_SECONDS (default 7d) must stay <= this in seconds.
  RENDER_GC_TTL_DAYS: "30"

  # --- Required app config (no defaults; the app refuses to start without these) ---
  # Run `meme-mcp check-env` to see exactly which fields are missing/invalid.

  # GitHub OAuth app. The client ID is non-secret; the matching
  # GITHUB_CLIENT_SECRET lives in the Secret (see secret.example.yaml).
  GITHUB_CLIENT_ID: "replace-with-github-oauth-app-client-id"
  GITHUB_REDIRECT_URI: "https://meme.example.com/auth/callback"
  # Allowlist file path. Point at a ConfigMap-mounted file (see README ->
  # "Declarative allowlist") or a path on the PVC the CLI can write.
  GITHUB_ALLOWLIST_PATH: "/etc/meme-mcp/allowlist.txt"
  # Operator (admin) GitHub login. Stored namespaced internally as github:<login>.
  OPERATOR_GITHUB_LOGIN: "replace-with-your-github-login"

  # Vision-language model backend (OpenAI-compatible /v1). The matching
  # VLM_API_KEY / EMBEDDING_API_KEY live in the Secret (a non-empty value is
  # required even when the backend, e.g. Ollama, ignores it).
  VLM_BASE_URL: "https://api.openai.com/v1"
  VLM_MODEL: "replace-with-vision-capable-model"

  # Embedding backend for semantic search (OpenAI-compatible /v1). Defaults to the
  # cluster Ollama service; pull the model once: `ollama pull qwen3-embedding:0.6b`.
  # EMBEDDING_DIMENSIONS must match the model (1024 for qwen3-embedding:0.6b). After
  # changing the model or dimensions, run reindex-embeddings --force as a Job that
  # completes BEFORE the Deployment picks up the new env, or the boot guard fails
  # closed. The matching EMBEDDING_API_KEY lives in the Secret (any non-empty value;
  # Ollama ignores it).
  EMBEDDING_BASE_URL: "http://ollama.ollama.svc.cluster.local:11434/v1"
  EMBEDDING_MODEL: "qwen3-embedding:0.6b"
  EMBEDDING_DIMENSIONS: "1024"

  # Public origin used to sign render URLs and derive OAuth metadata. Optional:
  # if unset it is derived from GITHUB_REDIRECT_URI's origin. Set it explicitly
  # when the public origin differs from the GitHub redirect origin. Changing it
  # invalidates every outstanding signed render URL (fail-closed on conflict).
  # PUBLIC_BASE_URL: "https://meme.example.com"

  # --- Google OAuth sign-in (optional second provider, OFF by default) ---
  # When enabled, non-GitHub friends can sign in with a Google account. All three
  # Google fields are required when GOOGLE_OAUTH_ENABLED is "true":
  #   * GOOGLE_REDIRECT_URI must end with /auth/google/callback and share the
  #     public origin (PUBLIC_BASE_URL, else the GitHub redirect origin), or the
  #     app fails closed at startup.
  #   * GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET live in the Secret.
  # Invite a Google friend by adding `google:<email>` to the allowlist; they pin
  # to their immutable Google `sub` on first verified sign-in (trust-on-first-use).
  GOOGLE_OAUTH_ENABLED: "false"
  # GOOGLE_REDIRECT_URI: "https://meme.example.com/auth/google/callback"

  # --- Native MCP OAuth 2.1 authorization server (optional, OFF by default) ---
  # When "true", meme-mcp serves its own /authorize, /token, /register, /revoke
  # and RFC 8414 metadata at the public origin so Claude's native custom-connector
  # UI can connect with a URL + sign-in (no `npx mcp-remote` bridge). Login still
  # delegates to GitHub/Google and token issuance is gated by the friend allowlist;
  # the existing PAT + mcp-remote path keeps working alongside it. When enabled,
  # OAUTH_TOKEN_PEPPER and OAUTH_SECRET_ENC_KEY are required (see secret.example.yaml).
  # The issuer/resource origin reuses PUBLIC_BASE_URL (else the GitHub redirect origin).
  OAUTH_AS_ENABLED: "false"
