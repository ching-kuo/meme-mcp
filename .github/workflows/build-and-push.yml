# Lint, type-check, and test the project, then build the container image and push it
# to GitHub Container Registry (ghcr.io). The image push is gated on the test job, so a
# broken commit never publishes an image. Free for this public repo: Actions minutes are
# unlimited and ghcr.io storage/bandwidth are free for public packages.
name: Build and push image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Default the token to read-only; the publish job opts into packages:write below.
permissions:
  contents: read

# Supersede in-flight runs for the same ref so pushes don't queue stale builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # --locked fails loudly if uv.lock has drifted from pyproject.toml.
      # libmagic is intentionally absent (so is it in deploy/Dockerfile): detect_mime
      # falls back to byte-prefix sniffing, so CI exercises the same path as production.
      - name: Sync dependencies
        run: uv sync --extra dev --locked

      - name: Ruff
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest

  build-and-push:
    name: Build and push to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Buildx is required for the type=gha layer cache below.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we will actually push (skipped on pull_request,
      # where a fork's token cannot write packages anyway).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Disable auto 'latest' (it tracks GitHub's default branch, currently a feature
          # branch); pin 'latest' explicitly to main instead.
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          # Push on branch/tag pushes and manual runs; build-only on PRs to validate the Dockerfile.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-platform image: skip provenance/SBOM attestation manifests that would
          # otherwise add 'unknown/unknown' entries and extra package versions.
          provenance: false
