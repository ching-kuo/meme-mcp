# Lint, type-check, and test the project, then build the container image and push it
# to GitHub Container Registry (ghcr.io). The image push is gated on the test job, so a
# broken commit never publishes an image. Free for this public repo: Actions minutes are
# unlimited and ghcr.io storage/bandwidth are free for public packages.
name: Build and push image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Default the token to read-only; the publish job opts into packages:write below.
permissions:
  contents: read

# Supersede in-flight runs for the same ref so pushes don't queue stale builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      # --all-extras so mypy can resolve the optional postgres/s3 imports
      # (psycopg, pgvector, boto3) used in src; --locked fails loudly if uv.lock
      # drifted. The postgres/s3 test suites stay skipped (they gate on
      # MEMEMCP_TEST_* env vars, not on package presence).
      # libmagic is intentionally absent (so is it in deploy/Dockerfile): detect_mime
      # falls back to byte-prefix sniffing, so CI exercises the same path as production.
      - name: Sync dependencies
        run: uv sync --all-extras --locked

      - name: Ruff
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest

  build-and-push:
    name: Build and push to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Buildx is required for the type=gha layer cache below.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Only authenticate when we will actually push (skipped on pull_request,
      # where a fork's token cannot write packages anyway).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          # Disable auto 'latest' (it tracks GitHub's default branch, currently a feature
          # branch); pin 'latest' explicitly to main instead.
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          # Push on branch/tag pushes and manual runs; build-only on PRs to validate the Dockerfile.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-platform image: skip provenance/SBOM attestation manifests that would
          # otherwise add 'unknown/unknown' entries and extra package versions.
          provenance: false
